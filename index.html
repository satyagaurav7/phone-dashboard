<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0E14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FLOWSTATE">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>FLOWSTATE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Public+Sans:wght@400;600;700&family=B612+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* — FLOWSTATE palette: dark canvas, earned light —
       Variable names kept from the passport era so every reference reskins:
       --passport = hero/nav surface · --maple = amber urgency (never shame red)
       --customs = flow accent (progress cyan) · --foil = gold (PR story) */
    --passport:#0E1420;   /* hero / nav surface    */
    --page:#0B0E14;       /* dark canvas           */
    --ink:#E6EBF5;        /* primary text          */
    --maple:#E8A13C;      /* amber — urgency, info, never punishment */
    --customs:#4FD8EB;    /* flow cyan — progress glow */
    --foil:#C9A227;       /* gold — PR narrative   */
    --violet:#8B7CF6;     /* secondary accent      */
    --line:#232B3E; --sub:#8A94AD; --card:#111624; --well:#161D2E;
    --disp:'Barlow Condensed',ui-sans-serif,sans-serif;
    --body:'Public Sans',system-ui,sans-serif;
    --mono:'B612 Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(79,216,235,.06), transparent 60%),
      var(--page);
    color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.5;
    -webkit-tap-highlight-color:transparent;
  }
  #appRoot{max-width:780px;margin:0 auto;padding:14px 14px calc(104px + env(safe-area-inset-bottom));display:none}
  button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer;text-align:left}
  :focus-visible{outline:3px solid var(--foil);outline-offset:2px;border-radius:4px}

  /* ============ hero (passport cover) ============ */
  .cover{background:linear-gradient(160deg,#101A2C 0%,var(--passport) 55%);border-radius:10px;color:#fff;padding:18px 18px 0;
    border:1.5px solid var(--line);border-top:2px solid rgba(79,216,235,.55);overflow:hidden}
  .cover .kicker{font-family:var(--disp);font-weight:600;letter-spacing:.22em;font-size:13px;color:var(--foil);text-transform:uppercase}
  .cover h1{font-family:var(--disp);font-weight:700;font-size:30px;margin:2px 0 0;letter-spacing:.02em;text-transform:uppercase}
  .cover .date{font-family:var(--mono);font-size:12.5px;color:#B9C6DE;margin-top:3px}
  .heroRow{display:flex;gap:18px;align-items:center;flex-wrap:wrap;padding:16px 0 14px}
  .streakBig{font-family:var(--mono);font-weight:700;font-size:52px;line-height:1;color:#fff}
  .streakLbl{font-family:var(--disp);font-weight:600;letter-spacing:.18em;font-size:13px;color:#B9C6DE;text-transform:uppercase}
  .bestLbl{font-family:var(--mono);font-size:12.5px;color:var(--foil);margin-top:6px}
  .statusLine{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:.04em;color:#EAD9A0;padding:0 0 14px}
  .mrz{background:rgba(79,216,235,.07);color:#9FE8F2;font-family:var(--mono);font-size:12px;letter-spacing:2px;
    padding:8px 12px;margin:0 -18px;white-space:nowrap;overflow:hidden;border-top:1.5px dashed rgba(79,216,235,.25)}
  #syncStatus{font-family:var(--mono);font-size:11px;color:var(--foil);opacity:.85;margin-top:2px}
  .xpWrap{padding:0 0 14px}
  .xpTop{display:flex;justify-content:space-between;font-family:var(--disp);font-weight:600;letter-spacing:.14em;font-size:12px;color:var(--foil);text-transform:uppercase;margin-bottom:5px}
  .xpBar{height:8px;background:rgba(255,255,255,.14);border-radius:4px;overflow:hidden}
  .xpFill{height:100%;background:var(--foil)}
  .xpSub{font-family:var(--mono);font-size:11px;color:#B9C6DE;margin-top:4px}

  /* ============ form cards ============ */
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:8px;padding:16px;margin-top:14px}
  .secTitle{display:flex;align-items:baseline;gap:8px;margin:0 0 12px}
  .secTitle .no{font-family:var(--mono);font-size:11px;color:var(--sub)}
  .secTitle h2{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.14em;text-transform:uppercase;margin:0}
  .secTitle .tally{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:13px}

  /* stamp rows */
  .row{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:1.5px solid var(--line);
    border-radius:6px;margin-bottom:8px;background:var(--well);cursor:pointer;user-select:none;transition:background .15s,box-shadow .25s}
  .row:active{transform:scale(.99)}
  .row .emo{font-size:19px;flex:0 0 auto}
  .row .lbl{font-weight:600;font-size:15.5px}
  .row .subt{font-size:12.5px;color:var(--sub);font-weight:400;margin-top:1px}
  .row .spacer{flex:1}
  .stamp{flex:0 0 auto;font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.08em;
    border:2px dashed #3A4560;color:var(--sub);border-radius:6px;padding:7px 10px;transform:rotate(0)}
  .row.done{background:rgba(79,216,235,.08);border-color:rgba(79,216,235,.45);box-shadow:0 0 14px -6px rgba(79,216,235,.5)}
  .row.done .stamp{border:2px solid var(--customs);color:var(--customs);background:rgba(79,216,235,.08);transform:rotate(-3deg);animation:slam .28s cubic-bezier(.2,1.6,.5,1)}
  .row.navyInk.done{background:rgba(139,124,246,.08);border-color:rgba(139,124,246,.45);box-shadow:0 0 14px -6px rgba(139,124,246,.5)}
  .row.navyInk.done .stamp{border-color:var(--violet);color:var(--violet);background:rgba(139,124,246,.08)}
  .row.mapleInk.done{background:rgba(201,162,39,.08);border-color:rgba(201,162,39,.45);box-shadow:0 0 14px -6px rgba(201,162,39,.5)}
  .row.mapleInk.done .stamp{border-color:var(--foil);color:var(--foil);background:rgba(201,162,39,.08)}
  @keyframes slam{0%{transform:rotate(7deg) scale(1.5);opacity:0}60%{transform:rotate(-5deg) scale(.96);opacity:1}100%{transform:rotate(-3deg) scale(1)}}
  .timeWrap{display:flex;align-items:center;gap:6px;flex:0 0 auto;margin-right:2px}
  .timeWrap input{font-family:var(--mono);font-size:13px;border:1.5px solid var(--line);border-radius:5px;padding:5px 6px;color:var(--ink);background:var(--well)}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13px;border:1.5px solid var(--line);background:var(--well);border-radius:4px;padding:8px 12px;color:var(--ink)}
  .chip b{color:var(--customs)}

  /* tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .tile{border:1.5px solid var(--line);background:var(--well);border-radius:8px;padding:14px;position:relative;cursor:pointer;transition:border-color .15s;width:100%}
  .tile:hover{border-color:var(--customs)}
  .tile .dot{position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;box-shadow:inset 0 0 0 2px var(--card)}
  .tile .big{font-family:var(--mono);font-weight:700;font-size:30px;line-height:1.05}
  .tile .cap{font-family:var(--disp);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:12.5px;color:var(--sub);margin-top:7px}
  .tile .amend{font-family:var(--mono);font-size:10.5px;color:var(--sub);margin-top:6px;opacity:.8}
  .t-good .big{color:var(--customs)} .t-warn .big{color:#E8B45A} .t-bad .big{color:var(--maple)} .t-idle .big{color:var(--ink)}
  .d-good{background:var(--customs)} .d-warn{background:#C98A00} .d-bad{background:var(--maple)} .d-idle{background:#3A4560}

  /* two-up on wide screens */
  .grid2{display:grid;grid-template-columns:1fr;gap:0}
  @media(min-width:760px){ .grid2{grid-template-columns:1fr 1fr;gap:14px;align-items:start} .grid2 > .card{margin-top:14px} }

  /* health */
  .hcard p{margin:6px 0 0;font-size:14.5px;color:var(--ink)}
  .hcard .sub{color:var(--sub);font-size:13px}

  /* ============ timetable (Plan tab) ============ */
  .tl{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:1.5px solid var(--line);
    border-radius:6px;margin-bottom:6px;background:var(--well);cursor:pointer;user-select:none}
  .tl:active{transform:scale(.995)}
  .tl .tlt{font-family:var(--mono);font-size:11.5px;color:var(--sub);flex:0 0 86px;line-height:1.3}
  .tl .emo{font-size:16px;flex:0 0 auto}
  .tl .lbl{font-weight:600;font-size:14px}
  .tl .st{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;
    border:2px dashed #3A4560;color:var(--sub);border-radius:5px;padding:4px 7px;flex:0 0 auto;white-space:nowrap}
  .tl.done{background:rgba(79,216,235,.08);border-color:rgba(79,216,235,.45)}
  .tl.done .st{border-style:solid;border-color:var(--customs);color:var(--customs);transform:rotate(-3deg)}
  .tl.fail{opacity:.55}
  .tl.fail .st{border-style:solid;border-color:#3A4560;color:var(--sub)}
  .tl.now{border-color:var(--customs);background:rgba(79,216,235,.08);box-shadow:0 0 16px -6px rgba(79,216,235,.55)}
  .tl.now .st{border-color:var(--customs);color:var(--customs)}
  .wkRow{display:flex;gap:6px;margin-bottom:12px}
  .dayChip{flex:1;text-align:center;border:1.5px solid var(--line);border-radius:6px;background:var(--well);padding:7px 2px;cursor:pointer}
  .dayChip .dn{font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
  .dayChip .dd{font-family:var(--mono);font-weight:700;font-size:14px;margin-top:1px}
  .dayChip.sel{border-color:var(--customs);background:rgba(79,216,235,.08)}
  .dayChip.tdy .dn{color:var(--customs)}

  /* ============ history heatmap ============ */
  .hmWrap{overflow-x:auto;padding-bottom:4px}
  .hmMonths{display:flex;gap:3px;height:14px;margin:0 0 4px;font-family:var(--mono);font-size:10px;color:var(--sub)}
  .hmMonths span{width:13px;flex:0 0 auto;overflow:visible;white-space:nowrap}
  .hmGrid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,13px);grid-auto-columns:13px;gap:3px}
  .hmCell{width:13px;height:13px;border-radius:3px;border:1px solid var(--line);background:#131A29;padding:0;cursor:pointer}
  .hmCell.part{background:rgba(79,216,235,.32);border-color:rgba(79,216,235,.5)}
  .hmCell.full{background:var(--customs);border-color:var(--customs);box-shadow:0 0 6px -1px rgba(79,216,235,.7)}
  .hmCell.today{outline:2px solid var(--customs);outline-offset:1px}
  .hmDow{display:grid;grid-template-rows:repeat(7,13px);gap:3px;margin:18px 6px 0 0;font-family:var(--mono);font-size:9px;color:var(--sub);flex:0 0 auto}
  .hmLegend{display:flex;gap:12px;align-items:center;margin-top:10px;font-size:12px;color:var(--sub);flex-wrap:wrap}
  .hmLegend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}

  /* ============ bottom nav ============ */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--passport);border-top:2px solid rgba(79,216,235,.35);padding-bottom:env(safe-area-inset-bottom)}
  .navIn{max-width:780px;margin:0 auto;display:flex}
  .navBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;color:#55617F;position:relative}
  .navBtn .nEmo{font-size:19px;line-height:1}
  .navBtn .nLbl{font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .navBtn.on{color:#fff}
  .navBtn.on::after{content:"";position:absolute;top:-2px;left:22%;right:22%;height:2px;background:var(--customs);box-shadow:0 0 8px rgba(79,216,235,.8)}

  /* ============ modal ============ */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(20,33,61,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{width:100%;max-width:340px;background:var(--card);border-radius:8px;border:1.5px solid var(--line);overflow:hidden;animation:mIn .22s cubic-bezier(.3,1.4,.6,1)}
  @keyframes mIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
  .modal header{background:var(--passport);color:#fff;padding:12px 16px;font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:14.5px}
  .modal .body{padding:16px}
  .modal label{display:block;font-family:var(--disp);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:12px;color:var(--sub);margin:0 0 5px}
  .modal input{width:100%;font-family:var(--mono);font-size:16px;padding:10px 12px;border:1.5px solid var(--line);border-radius:6px;color:var(--ink);margin-bottom:14px;background:var(--well)}
  .modal input:focus{outline:none;border-color:var(--customs)}
  .mBtns{display:flex;gap:10px}
  .mBtns .cancel{flex:1;text-align:center;padding:11px;border:1.5px solid var(--line);border-radius:6px;color:var(--sub);font-weight:600}
  .mBtns .save{flex:1;text-align:center;padding:11px;border-radius:6px;background:var(--customs);color:#06222A;font-weight:700;font-family:var(--disp);letter-spacing:.12em;text-transform:uppercase}

  /* ============ celebration ============ */
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;background:var(--passport);color:#fff;
    border:1.5px solid rgba(79,216,235,.6);border-radius:8px;padding:12px 18px;font-weight:700;font-size:15px;white-space:nowrap;
    box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 24px -6px rgba(79,216,235,.5);animation:tIn .35s cubic-bezier(.3,1.5,.6,1)}
  @keyframes tIn{from{opacity:0;transform:translate(-50%,-16px)}to{opacity:1;transform:translate(-50%,0)}}
  .burstBox{position:fixed;top:66px;left:50%;width:0;height:0;z-index:75;pointer-events:none}
  .pc{position:absolute;left:0;top:0;font-size:15px;animation:fly 1.3s ease-out forwards}
  .pcSq{position:absolute;left:0;top:0;width:8px;height:8px;border-radius:1px;animation:fly 1.3s ease-out forwards}
  @keyframes fly{from{opacity:1;transform:translate(0,0) rotate(0)}to{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--rot))}}
  /* ============ anchor + momentum ============ */
  .anchorBtn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 14px;border:1.5px solid rgba(79,216,235,.4);
    border-radius:8px;background:linear-gradient(135deg,rgba(79,216,235,.10),rgba(139,124,246,.06));cursor:pointer;user-select:none;transition:box-shadow .25s}
  .anchorBtn .aEmo{font-size:26px;flex:0 0 auto}
  .anchorBtn .aLbl{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
  .anchorBtn .aSub{font-size:12.5px;color:var(--sub);font-weight:400;margin-top:2px;text-transform:none;letter-spacing:0;font-family:var(--body)}
  .anchorBtn .stamp{margin-left:auto}
  .anchorBtn.done{border-color:var(--customs);box-shadow:0 0 24px -6px rgba(79,216,235,.65);background:linear-gradient(135deg,rgba(79,216,235,.16),rgba(79,216,235,.05))}
  .anchorBtn.done .stamp{border:2px solid var(--customs);color:var(--customs)}
  .smallGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .swin{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:6px;background:var(--well);
    padding:10px;cursor:pointer;user-select:none;font-size:13px;font-weight:600;color:var(--ink)}
  .swin .pts{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--sub);white-space:nowrap}
  .swin.done{background:rgba(79,216,235,.10);border-color:rgba(79,216,235,.5);box-shadow:0 0 12px -5px rgba(79,216,235,.55)}
  .swin.done .pts{color:var(--customs)}

  /* ============ auth gate ============ */
  #authGate{
    max-width:360px;margin:14vh auto 0;background:var(--card);border:1.5px solid var(--line);
    border-radius:10px;padding:32px 28px;box-shadow:0 18px 40px -18px rgba(0,0,0,.6),0 0 40px -14px rgba(79,216,235,.35);text-align:center;
    border-top:2px solid rgba(79,216,235,.55);animation:mIn .3s cubic-bezier(.3,1.4,.6,1)
  }
  #authGate .lock{font-size:34px}
  #authGate h2{margin:14px 0 4px;font-family:var(--disp);font-weight:700;font-size:20px;color:var(--ink);letter-spacing:.02em;text-transform:uppercase}
  #authGate .sub{color:var(--sub);font-size:14px;margin:0 0 20px}
  #authGate input{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:6px;font-size:16px;
    margin-bottom:12px;background:var(--well);color:var(--ink);font-family:var(--mono)
  }
  #authGate input:focus{outline:none;border-color:var(--customs)}
  #authGate button{
    width:100%;padding:13px;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;
    color:#06222A;background:var(--customs);font-family:var(--disp);letter-spacing:.12em;text-transform:uppercase;transition:filter .16s
  }
  #authGate button:hover{filter:brightness(1.2)}
  #authGate button:disabled{opacity:.6;cursor:default}
  #authGate .err{color:var(--maple);font-size:13.5px;margin-top:12px;min-height:18px}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
  <div id="authGate">
    <div class="lock">🌊</div>
    <h2>Welcome back, Satya</h2>
    <p class="sub">Enter your password. Enter the flow.</p>
    <input type="password" id="authPass" placeholder="Password" autocomplete="current-password">
    <button id="authSubmit">Unlock</button>
    <div class="err" id="authErr"></div>
  </div>

  <div id="appRoot" aria-live="polite"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import {
  getMessaging, getToken, isSupported as messagingSupported
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging.js";

// Web Push certificate key pair from Firebase console → Project settings →
// Cloud Messaging → Web configuration. Empty = push UI stays hidden.
const VAPID_KEY = 'BGuB7tmolQ5QSqAERQjBe8yp_SBXHWY7WScV2ZdK-ULsiID4_4rSEznIGkDpIFfpePIyhpK2rkQjudcgf7WXSLM';

// One service worker handles both offline caching and background push.
const swReady = ('serviceWorker' in navigator)
  ? navigator.serviceWorker.register('sw.js').catch((e) => { console.warn('SW registration failed', e); return null; })
  : Promise.resolve(null);

const firebaseConfig = {
  apiKey: "AIzaSyAiFSwmMc-qYYtXgsiaENQ3nRBBrmy7dc8",
  authDomain: "newt-90ca4.firebaseapp.com",
  projectId: "newt-90ca4",
  storageBucket: "newt-90ca4.firebasestorage.app",
  messagingSenderId: "772443408217",
  appId: "1:772443408217:web:fa78c2bb719a883e382e48"
};
const AUTH_EMAIL = 'booms.satya@gmail.com';

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const authGate = document.getElementById('authGate');
const appRoot = document.getElementById('appRoot');
const authPass = document.getElementById('authPass');
const authErr = document.getElementById('authErr');
const authSubmit = document.getElementById('authSubmit');

authSubmit.onclick = async () => {
  authErr.textContent = '';
  const pass = authPass.value;
  if (!pass) { authErr.textContent = 'Enter the password.'; return; }
  authSubmit.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, AUTH_EMAIL, pass);
  } catch (e) {
    const codeMap = {
      'auth/invalid-credential': 'Wrong password.',
      'auth/wrong-password': 'Wrong password.',
      'auth/user-not-found': 'Account not found — check the Firebase console setup.',
      'auth/too-many-requests': 'Too many attempts. Wait a bit and try again.',
      'auth/network-request-failed': 'Network error — check your connection.',
      'auth/user-disabled': 'This account is disabled in Firebase console.'
    };
    authErr.textContent = (codeMap[e.code] || ('Error: ' + e.code));
  }
  authSubmit.disabled = false;
};
authPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') authSubmit.click(); });

onAuthStateChanged(auth, async (user) => {
  if (user && user.email === AUTH_EMAIL) {
    authGate.style.display = 'none';
    appRoot.style.display = 'block';
    await initApp();
  } else if (user) {
    // Leftover session from an older version of this app (e.g. anonymous auth) — clear it.
    await signOut(auth);
  } else {
    appRoot.style.display = 'none';
    authGate.style.display = 'block';
    authPass.value = '';
  }
});

async function initApp(){
  const userDocRef = doc(db, 'dashboard', 'satya');
  const KEY = 'satya_daily_web';
  const todayStr = d => { d = d || new Date(); return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10); };
  const addDays = (s,n) => { const d = new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return todayStr(d); };
  const T = todayStr();

  // Timetable lives in schedule.json — one source of truth shared with the
  // notification sender (scripts/notify.mjs). SW caches it for offline.
  let SCHED_DATA = null;
  try { SCHED_DATA = await (await fetch('schedule.json', { cache: 'no-cache' })).json(); }
  catch (e) { try { const c = await caches.match('schedule.json'); if (c) SCHED_DATA = await c.json(); } catch (e2) {} }

  const blankDay = () => ({anchor:false,water:false,walk:false,read5:false,cookmeal:false,phonedown:false,smokefree:false,gym:false,language:false,cooked:false,sleep:false,study:false,money:false,meditate:false,breakfast:false,lunch:false,dinner:false,insulin:false,omega3:false,creatine:false,bonehealth:false,vitcd:false,fines:[],sched:{},completed:false});

  /* ---------- momentum engine (shared constants with scripts/notify.mjs) ----------
     Anchor +10 · small win +3 (max 4 count) · big win +8 · each new day −4 drift.
     Momentum lives in S.flow = {m, asOf}: m is the value at the START of asOf;
     today's gains are layered on live, then committed at the next day rollover.
     It can dip. It can never be reset to zero by a bad day. */
  const SMALL_KEYS = ['water','walk','read5','cookmeal','meditate','phonedown'];
  const BIG_KEYS = ['gym','language','study','cooked','smokefree','money'];
  const clampM = m => Math.max(0, Math.min(100, m));
  const dayGains = d => {
    if (!d) return 0;
    let g = (d.anchor===true || d.completed===true) ? 10 : 0; // completed = pre-FLOWSTATE legacy days
    g += Math.min(4, SMALL_KEYS.filter(k=>d[k]===true).length) * 3;
    g += BIG_KEYS.filter(k=>d[k]===true).length * 8;
    return g;
  };
  const FLOW_STATES = [[75,'🔥','Deep flow'],[50,'⚡','Flow'],[25,'🌊','In motion'],[0,'·','Cold start']];
  const flowStateOf = m => FLOW_STATES.find(([t])=>m>=t);

  let S = {};
  try { const raw = localStorage.getItem(KEY); S = raw ? JSON.parse(raw) : {}; } catch(e) { S = {}; }

  function normalize(){
    S.config = Object.assign({permit:"2027-01-31",celpipExam:"2026-08-15",cecDate:"2026-10-01",celpipL:10,celpipR:6,celpipW:11,celpipS:11,rentDay:1,ccDay:14,score:0,cardBal:0,cardLimit:0,efund:0,budgetLeft:0,treatsClaimed:0}, S.config||{});
    S.actions = Object.assign({oinp:false,wfg:false,carfax:false,pcc:false,celpip:false,innobox:false,resume:false,permitdoc:false}, S.actions||{});
    S.days = S.days || {};
    S.fcmTokens = Array.isArray(S.fcmTokens) ? S.fcmTokens : [];
    S.streak = S.streak || 0; S.best = S.best || 0; S.lastComplete = S.lastComplete || null;
    // Migrate the old streak into starting momentum, once. streak/best stay as legacy stats.
    if (!S.flow || typeof S.flow.m !== 'number' || !/^\d{4}-\d{2}-\d{2}$/.test(String(S.flow.asOf))) S.flow = { m: clampM((S.streak||0)*8 + 20), asOf: T };
    // Day rollover: commit each passed day's gains, apply −4 drift per day.
    if (S.flow.asOf < T) {
      let m = S.flow.m, d = S.flow.asOf;
      while (d < T) { m = clampM(m + dayGains(S.days[d]) - 4); d = addDays(d, 1); }
      S.flow = { m, asOf: T };
    }
    S.days[T] = Object.assign(blankDay(), S.days[T]||{});
  }
  normalize();
  const momentumNow = s => clampM(s.flow.m + dayGains(s.days[T]));

  const syncEl = () => document.getElementById('syncStatus');
  const setSyncUI = (text) => { const el = syncEl(); if (el) el.textContent = text; };

  try {
    setSyncUI('Loading…');
    const snap = await getDoc(userDocRef);
    if (snap.exists()) { S = snap.data(); }
    normalize();
    setSyncUI('Synced');
  } catch (e) {
    setSyncUI('On this device');
  }

  const saveLocal = () => { try { localStorage.setItem(KEY, JSON.stringify(Dash.state)); } catch(e) {} };
  const saveCloud = async () => {
    try { setSyncUI('Saving…'); await setDoc(userDocRef, Dash.state, { merge:false }); setSyncUI('Synced'); }
    catch(e) { setSyncUI('Saved on this device'); }
  };

  const getPath = (o,p) => String(p).split('.').reduce((a,k)=>a==null?a:a[k], o);

  window.Dash = {
    today: T,
    state: S,
    _fn: null,
    set(path, value){
      // FLOWSTATE: no streak mutation, no day-locking, no punishment side
      // effects. Momentum is derived from what was actually logged.
      const parts = String(path).split('.'); let o = this.state;
      for (let i=0; i<parts.length-1; i++){ if (o[parts[i]] == null) o[parts[i]] = {}; o = o[parts[i]]; }
      o[parts[parts.length-1]] = value;
      saveLocal(); saveCloud();
      if (this._fn) this._fn(this.state);
    },
    render(fn){ this._fn = fn; fn(this.state); }
  };
  saveLocal();

  /* ---------- web push: obtain/refresh the FCM token, store it in state ---------- */
  async function ensurePushToken(interactive){
    if (!VAPID_KEY) return { ok:false, reason:'setup' };
    try {
      if (!('Notification' in window) || !(await messagingSupported())) return { ok:false, reason:'unsupported' };
      if (Notification.permission !== 'granted') {
        if (!interactive) return { ok:false, reason:'no-permission' };
        const p = await Notification.requestPermission();
        if (p !== 'granted') return { ok:false, reason:'denied' };
      }
      const reg = await swReady;
      if (!reg) return { ok:false, reason:'no-sw' };
      const tok = await getToken(getMessaging(fbApp), { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
      if (!tok) return { ok:false, reason:'no-token' };
      const cur = Dash.state.fcmTokens || [];
      // Tokens rotate; keep the newest few (phone + laptop) so the sender
      // always has a live one. Pruning of dead tokens happens sender-side.
      if (!cur.includes(tok)) Dash.set('fcmTokens', cur.concat([tok]).slice(-5));
      return { ok:true };
    } catch (e) { console.warn('push token', e); return { ok:false, reason:'error' }; }
  }
  // Silent refresh on every open — standard fix for FCM token rotation.
  if (VAPID_KEY && 'Notification' in window && Notification.permission === 'granted') ensurePushToken(false);

  /* ================================ UI (FLOWSTATE design) ================================ */
  (function(){
    'use strict';
    const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const SMALL_WINS = [
      ['water','🚰','Hydrated properly'],
      ['walk','🚶','10-min walk / moved'],
      ['read5','📖','Opened the CELPIP book'],
      ['cookmeal','🍳','Cooked one meal'],
      ['meditate','🧘','One breathing reset'],
      ['phonedown','🌙','Phone down before bed'],
    ];
    const BIG_WINS = [
      ['gym','🏋️','Gym session','showing up is the win'],
      ['language','📚','CELPIP 20-min block','the PR blocker, chipped'],
      ['study','💻','Upskill hour','CISSP · cloud · AppSec'],
      ['cooked','🍽️','Full cooked day','every meal home-made'],
      ['smokefree','🚭','Smoke-free day','stamp it at night'],
      ['money','💸','Money move','side income · invest · learn'],
    ];
    const FINES = [
      ['cab','🚕','Cab ride',12],
      ['delivery','🍔','Delivery order',20],
      ['smoke','🚬','Smokes / weed buy',15],
      ['impulse','🛒','Impulse buy',15],
    ];
    const FUEL = [
      ['breakfast','🌅','Breakfast','core'],
      ['lunch','☀️','Lunch','core'],
      ['dinner','🌙','Dinner','core'],
      ['insulin','💉','Insulin done','medical log — always worth a tap'],
    ];
    const SUPPS = [
      ['omega3','Omega-3','Fish Oil 1300 mg'],
      ['creatine','Creatine','MuscleTech Platinum 100% Creatine'],
      ['bonehealth','Bone Health','Ca+Mg+Zn · Webber Naturals 333/167/17 mg'],
      ['vitcd','Vitamin C + D3','Jamieson Chewable 500/500'],
    ];
    const GUARDRAILS = [
      ['I don’t fake','— my real record is enough'],
      ['No','instant / payday loans'],
      ['Insulin on time','· eat enough'],
      ['One lane:','Cyber → PR'],
      ['Plan Sunday,','don’t panic Monday'],
    ];
    const ACTIONS = [
      ['oinp','HR — ask about OINP employer support (+600 CRS, primary path)'],
      ['wfg','WFG — written “$0 balance, nothing reported to bureaus”'],
      ['carfax','CARFAX — reference letter WITH duties (NOC 21220)'],
      ['pcc','PCC India — start police clearance'],
      ['celpip','CELPIP — book retest → fix Reading, target CLB 9'],
      ['innobox','Innobox — India experience letter'],
      ['resume','Resume — updated PDF (CEC and OINP both need it)'],
      ['permitdoc','Work permit copy — add to PR folder'],
    ];

    let tab='today', prevAnchor=null, prevBig=null, modalSpec=null, planDay=null;

    const daysUntil = s => { if(!s) return null;
      const a=new Date(Dash.today+'T00:00:00'), b=new Date(String(s)+'T00:00:00');
      return isNaN(b) ? null : Math.round((b-a)/864e5); };
    const daysToDay = day => { day=parseInt(day,10); if(!day) return null;
      const n=new Date(), t=new Date(n.getFullYear(),n.getMonth(),n.getDate());
      let d=new Date(n.getFullYear(),n.getMonth(),day);
      if(d<t) d=new Date(n.getFullYear(),n.getMonth()+1,day);
      return Math.round((d-t)/864e5); };
    const getPath=(o,p)=>String(p).split('.').reduce((a,k)=>a==null?a:a[k],o);
    const pad=(n,w)=>String(n).padStart(w,'0');
    const addDaysStr=(s,n)=>{const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);const t=new Date(d.getTime()-d.getTimezoneOffset()*60000);return t.toISOString().slice(0,10);};

    /* ---------- Visa Points (XP) — derived from real record, never stored ---------- */
    const LEVELS=[[0,'Visitor'],[150,'Student'],[400,'Worker'],[800,'Candidate'],[1400,'Nominee'],[2200,'Permanent Resident']];
    function calcXP(s){
      // FLOWSTATE: additive only. Nothing you do can subtract Visa Points.
      let xp=0;
      for(const k in (s.days||{})){
        const d=s.days[k]; if(!d) continue;
        if(d.anchor===true||d.completed===true) xp+=10;      // showed up (completed = legacy days)
        xp += BIG_KEYS.filter(x=>d[x]===true).length*5;
        xp += Math.min(4,SMALL_KEYS.filter(x=>d[x]===true).length)*2;
      }
      for(const k in (s.actions||{})) if(s.actions[k]===true) xp+=100;
      return xp;
    }
    function levelInfo(xp){
      let i=0; for(let j=0;j<LEVELS.length;j++) if(xp>=LEVELS[j][0]) i=j;
      const next=LEVELS[i+1]||null;
      return {idx:i,name:LEVELS[i][1],next,progress:next?(xp-LEVELS[i][0])/(next[0]-LEVELS[i][0]):1};
    }

    function momentumRing(m, todayGain){
      const C=2*Math.PI*56, off=C*(1-m/100);
      const st=flowStateOf(m);
      return `<svg width="160" height="160" viewBox="0 0 160 160" role="img" aria-label="Momentum ${m} of 100 — ${st[2]}">
        <circle cx="80" cy="80" r="56" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"/>
        <circle cx="80" cy="80" r="56" fill="none" stroke="rgba(79,216,235,.28)" stroke-width="15" stroke-linecap="round"
          stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 80 80)"/>
        <circle cx="80" cy="80" r="56" fill="none" stroke="#4FD8EB" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 80 80)"/>
        <text x="80" y="78" text-anchor="middle" font-family="B612 Mono,monospace" font-weight="700" font-size="36" fill="#fff">${m}</text>
        <text x="80" y="98" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-weight="600" font-size="11.5" fill="#4FD8EB" letter-spacing="2.5">${st[2].toUpperCase()}</text>
        ${todayGain>0?`<text x="80" y="116" text-anchor="middle" font-family="B612 Mono,monospace" font-size="10.5" fill="#C9A227">+${todayGain} today</text>`:''}
      </svg>`;
    }

    function rowHTML(path, emo, lbl, sub, state, inkClass, extra){
      const cls = state===true?'done':'';
      const stamp = state===true?'DONE ✓':'TAP';
      return `<div class="row ${cls} ${inkClass||''}" role="button" tabindex="0" aria-pressed="${state===true}" aria-label="${lbl}: ${state===true?'done':'not yet'}" data-toggle="${path}">
        <span class="emo" aria-hidden="true">${emo}</span>
        <span><span class="lbl">${lbl}</span>${sub?`<div class="subt">${sub}</div>`:''}</span>
        <span class="spacer"></span>${extra||''}
        <span class="stamp">${stamp}</span>
      </div>`;
    }
    function secTitle(no,txt,tally,tone){
      return `<div class="secTitle"><span class="no">${no}</span><h2>${txt}</h2>${tally?`<span class="tally" style="color:${tone||'var(--sub)'}">${tally}</span>`:''}</div>`;
    }
    function tileHTML(key,big,cap,tone){
      return `<button class="tile t-${tone}" data-edit="${key}">
        <span class="dot d-${tone}" aria-hidden="true"></span>
        <div class="big">${big}</div><div class="cap">${cap}</div>
        <div class="amend">TAP TO AMEND ✎</div>
      </button>`;
    }

    function todayHTML(s,d){
      const hr=new Date().getHours();
      const greet=hr<5?'Late night':hr<12?'Good morning':hr<17?'Good afternoon':hr<22?'Good evening':'Late night';
      const dateStr=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});
      const gToday=dayGains(d);
      const m=momentumNow(s);
      const st=flowStateOf(m);
      const anchored=d.anchor===true;
      const bigDone=BIG_KEYS.filter(k=>d[k]===true).length;
      const status = !anchored
        ? (gToday>0 ? `+${gToday} momentum already banked — drop the anchor and the day counts.`
                    : 'The anchor takes 2 minutes. Everything after it is bonus.')
        : gToday>=26 ? `Deep work day — +${gToday} momentum and glowing.`
        : `Day counted ⚓ +${gToday} momentum${bigDone?` · ${bigDone} big win${bigDone>1?'s':''}`:''}. Every extra tap is pure gain.`;
      const mrzPad = t => (t + '<'.repeat(44)).slice(0,44).replace(/</g,'&lt;');
      const mrz1 = mrzPad('SATYA<GAURAV<<FLOWSTATE');
      const mrz2 = mrzPad(`FLOW<${pad(m,3)}<${st[2].toUpperCase().replace(/ /g,'<')}<DAY<${anchored?'COUNTED':'OPEN'}<PR<2027`);
      const mrz=`${mrz1}<br>${mrz2}`;

      const xp=calcXP(s), lv=levelInfo(xp);
      const xpBlock=`<div class="xpWrap">
        <div class="xpTop"><span>Visa Points · ${xp}</span><span>Lv${lv.idx+1} · ${lv.name}</span></div>
        <div class="xpBar"><div class="xpFill" style="width:${Math.round(lv.progress*100)}%"></div></div>
        <div class="xpSub">${lv.next?`${lv.next[0]-xp} pts to ${lv.next[1].toUpperCase()}`:'MAX LEVEL — you made it home'} · gains only: anchor +10 · big +5 · small +2 · PR action +100</div>
      </div>`;

      // Suggested tap times for today's day kind (schedule.json tapPlan) —
      // the nudge notifications fire around these same times.
      const IT=(SCHED_DATA&&SCHED_DATA.tapPlan&&SCHED_DATA.tapPlan.itemTimes&&SCHED_DATA.tapPlan.itemTimes[kindOf(todow(Dash.today))])||{};
      const anchorCard=`<div class="card" style="border-color:rgba(79,216,235,.35)">
        ${secTitle('⚓','The Anchor', anchored?'DAY COUNTED':(IT.anchor?'~'+IT.anchor+' · 2 minutes':'2 minutes'), anchored?'var(--customs)':'var(--sub)')}
        <div class="anchorBtn${anchored?' done':''}" role="button" tabindex="0" aria-pressed="${anchored}" data-toggle="days.${Dash.today}.anchor" aria-label="Anchor: ${anchored?'done — day counted':'not yet'}">
          <span class="aEmo" aria-hidden="true">⚓</span>
          <span><span class="aLbl">${anchored?'Anchored':'Drop the anchor'}</span>
          <div class="aSub">CGM checked · insulin on track · I'm here${anchored||!IT.anchor?'':' · best right after waking'}</div></span>
          <span class="stamp">${anchored?'+10 ✓':'TAP'}</span>
        </div>
        ${anchored?'':'<div style="font-size:12px;color:var(--sub);margin-top:8px">This is the only thing the day asks of you. Do it and the day counts — no matter what else happens.</div>'}
      </div>`;

      const smallRows=`<div class="smallGrid">${SMALL_WINS.map(([k,e,l])=>
        `<div class="swin${d[k]===true?' done':''}" role="button" tabindex="0" aria-pressed="${d[k]===true}" aria-label="${l}: ${d[k]===true?'done':'not yet'}" data-toggle="days.${Dash.today}.${k}">
          <span aria-hidden="true">${e}</span><span>${l}</span><span class="pts">${d[k]===true?'+3 ✓':(IT[k]?IT[k]+' · ':'')+'+3'}</span>
        </div>`).join('')}</div>`;
      const smallDone=SMALL_WINS.filter(([k])=>d[k]===true).length;

      const bigRows = BIG_WINS.map(([k,e,l,sub])=>rowHTML(`days.${Dash.today}.${k}`,e,l,sub+(IT[k]?` · ~${IT[k]}`:''),d[k])).join('');

      const fines=d.fines||[];
      const fineTotal=fines.reduce((t,k)=>{const f=FINES.find(x=>x[0]===k);return t+(f?f[3]:0);},0);
      const fineRows=FINES.map(([k,e,l,amt])=>`<div class="row" role="button" tabindex="0" aria-label="Log leak: ${l}, $${amt}" data-fine="${k}" style="margin-bottom:8px">
        <span class="emo" aria-hidden="true">${e}</span><span><span class="lbl">${l}</span></span><span class="spacer"></span>
        <span class="stamp">$${amt}</span></div>`).join('');
      const fineLog = fines.length
        ? `<div style="font-size:12.5px;color:var(--sub);margin-top:6px;font-family:var(--mono)">Logged today: ${fines.map(k=>{const f=FINES.find(x=>x[0]===k);return f?f[1]:k;}).join(' ')} · $${fineTotal} <button data-fineundo style="color:var(--sub);text-decoration:underline;font-family:var(--mono);font-size:12px">undo last</button></div>`
        : `<div style="font-size:12.5px;color:var(--sub);margin-top:6px;font-family:var(--mono)">Nothing leaked today.</div>`;

      /* ---------- Right Now: current/next timetable block + today's deadlines ---------- */
      const rightNow=(()=>{
        if(!SCHEDS) return '';
        const blocks=SCHEDS[kindOf(todow(Dash.today))]||[];
        const nowM=new Date().getHours()*60+new Date().getMinutes();
        const sched=d.sched||{};
        let cur=null,nxt=null;
        for(let i=0;i<blocks.length;i++){
          const st=toM(blocks[i][1]);
          const en=blocks[i][2]?toM(blocks[i][2]):(blocks[i+1]?toM(blocks[i+1][1]):24*60);
          if(nowM>=st&&nowM<en){cur=blocks[i];break;}
          if(nowM<st){nxt=blocks[i];break;}
        }
        const b=cur||nxt;
        const c=s.config||{};
        const dueBits=[];
        if(daysToDay(c.rentDay)===0)dueBits.push('🏠 RENT DUE TODAY');
        if(daysToDay(c.ccDay)===0)dueBits.push('💳 CARD PAYMENT DUE TODAY');
        [['permit','🍁 Work permit expires'],['celpipExam','📚 CELPIP retest'],['cecDate','🍁 CEC eligibility']].forEach(([k,l])=>{
          if(daysUntil(c[k])===0)dueBits.push(`${l} TODAY`);
        });
        const flowLine = anchored
          ? `${st[1]} Momentum ${m} — ${st[2]}. Day counted.`
          : hr>=18 ? `⚓ Anchor still open — 2 minutes and today counts.`
          : `🌊 Momentum ${m} — anchor open, day ahead.`;
        let blockRow;
        if(b){
          const [k,bst,en,e,l]=b;
          const v=sched[k];
          const cls=v===true?'done':v==='fail'?'fail':'';
          const stTxt=v===true?'DONE ✓':v==='fail'?'SKIP':cur?'NOW':'···';
          blockRow=`<div class="tl ${cls}${cur&&!v?' now':''}" role="button" tabindex="0" data-toggle="days.${Dash.today}.sched.${k}" aria-label="${l}: ${v===true?'done':v==='fail'?'skipped':'pending'}">
            <span class="tlt">${bst}${en?'–'+en:''}</span><span class="emo" aria-hidden="true">${e}</span><span class="lbl">${cur?'':'Next · '}${l}</span><span class="st">${stTxt}</span></div>`;
        } else {
          blockRow=`<div style="font-size:13.5px;color:var(--sub)">No more blocks today. ${anchored?'Rest is earned.':'The anchor below still counts the day.'}</div>`;
        }
        return `<div class="card" style="border-left:3px solid var(--customs)">
          ${secTitle('NOW','Right Now')}
          ${blockRow}
          <div style="font-size:13.5px;margin-top:8px;color:${anchored?'var(--customs)':'var(--ink)'}">${flowLine}</div>
          ${dueBits.length?`<div style="font-size:13px;margin-top:6px;color:var(--maple);font-weight:700;font-family:var(--mono)">${dueBits.join(' · ')}</div>`:''}
        </div>`;
      })();

      const pushCard=(VAPID_KEY && 'Notification' in window && Notification.permission!=='granted')
        ? `<div class="card" style="border-left:4px solid var(--maple)">
            ${secTitle('ALERT','Notifications')}
            <div style="font-size:13.5px;color:var(--ink);margin-bottom:10px">The <b>7 AM flow brief</b>, <b>tap-window nudges</b> only while items sit open, and a <b>9 PM anchor reminder</b> if the day isn't counted. Do the things and the phone stays silent.</div>
            <button id="pushEnable" class="row" style="margin-bottom:0"><span class="emo" aria-hidden="true">🔔</span><span class="lbl">Enable notifications</span><span class="spacer"></span><span class="stamp">TAP</span></button>
            <div id="pushMsg" style="font-size:12.5px;color:var(--sub);margin-top:6px;min-height:16px"></div>
          </div>`
        : '';

      const fuelRows = FUEL.map(([k,e,l,sub])=>{
        const base=sub==='core'?'':sub;
        const t=IT[k]?(base?base+' · ~'+IT[k]:'~'+IT[k]):base;
        return rowHTML(`days.${Dash.today}.${k}`,e,l,t,d[k],k==='insulin'?'navyInk':'');

      const pctOver=n=>{let c=0;for(let i=0;i<n;i++){if(isAnchored(days[addDaysStr(Dash.today,-i)]))c++;}return Math.round(c/n*100);};
      const p7=pctOver(7),p30=pctOver(30);
      const anchorTotal=Object.keys(days).filter(k=>isAnchored(days[k])).length;

      const WEEKS=16;

    /* ---------- Plan tab: timetable data comes from schedule.json (shared with the notification sender) ---------- */
    const SCHEDS=(SCHED_DATA&&SCHED_DATA.schedules)||null;
    const DAY_KINDS=(SCHED_DATA&&SCHED_DATA.dayKinds)||['sun','office','office','wfh','wfh','wfh','sat'];
    const KIND_TITLES=(SCHED_DATA&&SCHED_DATA.kindTitles)||{office:'Office Day',wfh:'WFH Day',sat:'Saturday',sun:'Sunday'};
    const GLANCE=(SCHED_DATA&&SCHED_DATA.glance)||{};
    const todow=ds=>new Date(ds+'T00:00:00').getDay();
    const kindOf=dw=>DAY_KINDS[dw]||'sun';
    const toM=t=>{const p=t.split(':');return (+p[0])*60+(+p[1]);};

    function schedHTML(s){
      if(!SCHEDS) return `<div class="card">${secTitle('WEEK','Next 7 Days')}<p style="color:var(--sub);font-size:14px;margin:0">Couldn't load schedule.json — check your connection and reload.</p></div>`;
      const days=s.days||{};
      const DNAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const week=Array.from({length:7},(_,i)=>addDaysStr(Dash.today,i));
      const DN=week.map(ds=>DNAMES[todow(ds)]);
      const sel=(planDay&&week.indexOf(planDay)>=0)?planDay:Dash.today;
      const kind=kindOf(todow(sel));
      const title=KIND_TITLES[kind]||kind;
      const blocks=SCHEDS[kind]||[];
      const d=days[sel]||{}; const sched=d.sched||{};
      const editable=sel<=Dash.today;
      const isToday=sel===Dash.today;
      const n=new Date(); const nowM=n.getHours()*60+n.getMinutes();
      const fineSum=dd=>(dd&&dd.fines)?dd.fines.reduce((t,k)=>{const f=FINES.find(x=>x[0]===k);return t+(f?f[3]:0);},0):0;
      let done=0,missed=0;
      const rows=blocks.map((b,i)=>{
        const [k,st,en,e,l]=b;
        const v=sched[k];
        const endM=en?toM(en):(blocks[i+1]?toM(blocks[i+1][1]):24*60);
        const isNow=isToday&&nowM>=toM(st)&&nowM<endM;
        if(v===true)done++; else if(v==='fail')missed++;
        const cls=v===true?'done':v==='fail'?'fail':'';
        const stTxt=v===true?'DONE ✓':v==='fail'?'SKIP':(isNow?'NOW':editable?'···':'—');
        const tog=editable?` role="button" tabindex="0" data-toggle="days.${sel}.sched.${k}"`:` style="cursor:default"`;
        return `<div class="tl ${cls}${isNow&&!v?' now':''}"${tog} aria-label="${l}: ${v===true?'done':v==='fail'?'skipped':'pending'}">
          <span class="tlt">${st}${en?'–'+en:''}</span><span class="emo" aria-hidden="true">${e}</span><span class="lbl">${l}</span><span class="st">${stTxt}</span></div>`;
      }).join('');
      const chips=week.map((ds,i)=>`<button class="dayChip${ds===sel?' sel':''}${ds===Dash.today?' tdy':''}" data-plday="${ds}" aria-label="${DN[i]} ${ds}"><div class="dn">${DN[i]}</div><div class="dd">${+ds.slice(8)}</div></button>`).join('');
      const glance=week.map((ds,i)=>{
        const kw=kindOf(todow(ds));
        const label=GLANCE[kw]||'';
        const dd=days[ds]; const fined=fineSum(dd);
        const mark=ds<Dash.today?(dd&&dd.completed===true?'✓':'·'):ds===Dash.today?'●':'';
        return `<div style="display:flex;gap:10px;align-items:baseline;padding:6px 2px;border-bottom:1px dashed var(--line);font-size:13px${ds===Dash.today?';font-weight:700':''}">
          <b style="font-family:var(--mono);flex:0 0 62px">${DN[i]} ${+ds.slice(8)} ${mark}</b><span style="flex:1">${label}</span>${fined?`<b style="color:var(--sub);font-family:var(--mono)">$${fined}</b>`:''}</div>`;
      }).join('');
      const finesWeek=week.reduce((t,ds)=>t+fineSum(days[ds]),0);
      const officeN=week.filter(ds=>kindOf(todow(ds))==='office').length;
      const satN=week.filter(ds=>kindOf(todow(ds))==='sat').length;
      const planSpend=Math.round(officeN*6.5+satN*80);
      return `
        <div class="card">
          ${secTitle('WEEK','Next 7 Days', finesWeek?`$${finesWeek} leaked`:'no leaks', finesWeek?'var(--sub)':'var(--customs)')}
          ${glance}
          <div style="font-size:12.5px;color:var(--sub);margin-top:8px"><b style="color:var(--ink)">Planned spend, next 7 days: ~$${planSpend}</b> — bus $${(officeN*6.5).toFixed(0)} (${officeN} office day${officeN===1?'':'s'}) + groceries $${satN*80}. Everything else is $0 by design: cooked meals, gym near home, no rentals.</div>
        </div>
        <div class="card">
          ${secTitle('TIMETABLE',`${title}${isToday?' — today':''}`,`${done}/${blocks.length}${missed?' · '+missed+' skipped':''}`, 'var(--customs)')}
          <div class="wkRow">${chips}</div>
          ${rows}
          <div style="font-size:12px;color:var(--sub);margin-top:6px">${editable?'Tap a block when done · tap again = SKIP · again = clear. Glowing = right now.':'Future day — preview only.'} This is the machine that produces your wins — skipping a block is information, not failure.</div>
        </div>
        <div class="card">
          ${secTitle('ROUTE','Bus + Costs')}
          <div style="font-size:13.5px;color:var(--ink);line-height:1.6">
            🚌 <b>Home → work:</b> 1 Beaufort St → 100 Kellogg Ln ≈ 65 min. <b>Confirm the exact 7:37 bus in the Transit app once</b> — then it's law.<br>
            💰 Fare $3.25 · ~$52/mo at 2 office days/wk — skip the $95 pass.<br>
            🏋️ <b>Gym:</b> 710 Proudfoot Ln — near home, walk or short bus.<br>
            🚕 Cab = $12 = an automatic fine in the Penalty Box. Oversleeping has a price now.
          </div>
        </div>`;
    }

    function healthHTML(){
      return `
        <div class="card hcard">
          ${secTitle('MED','Type 1 Diabetes')}
          <p><b>NovoRapid</b> (bolus) + <b>Lantus</b> (basal) · CGM: Dexcom / Libre.</p>
          <p class="sub">Keep insulin timing steady · cut smoking — the quiet long-term wins.</p>
        </div>
        <div class="card hcard">
          ${secTitle('CLAIM','Disability Tax Credit')}
          <p>💡 T1D usually qualifies — refund <b>+ RDSP access</b>. Apply.</p>
        </div>
        <div class="card hcard">
          ${secTitle('NOTE','Daily checks')}
          <p class="sub">Insulin + meal stamps live on the <b>Today</b> tab — the anchor <i>is</i> the medicine check. Not medical advice — loop in your diabetes team for anything clinical.</p>
        </div>`;
    }

    const TABS=[['today','✓','Today'],['plan','🕐','Plan'],['pr','🍁','PR'],['money','💵','Money'],['health','🩺','Health'],['history','🗓️','History']];
    function navHTML(){
      return `<nav aria-label="Sections"><div class="navIn">${TABS.map(([k,e,l])=>
        `<button class="navBtn ${tab===k?'on':''}" data-tab="${k}" aria-current="${tab===k}"><span class="nEmo" aria-hidden="true">${e}</span><span class="nLbl">${l}</span></button>`).join('')}</div></nav>`;
    }

    const EDITS={
      permit:{title:'Work Permit Expiry',fields:[{path:'config.permit',label:'Expiry date',type:'date'}]},
      celpipExam:{title:'CELPIP Retest',fields:[{path:'config.celpipExam',label:'Exam date',type:'date'}]},
      cec:{title:'CEC Eligibility',fields:[{path:'config.cecDate',label:'Eligibility date (1 yr Canadian work)',type:'date'}]},
      celpipScores:{title:'CELPIP Scores',fields:[{path:'config.celpipL',label:'Listening',type:'number'},{path:'config.celpipR',label:'Reading',type:'number'},{path:'config.celpipW',label:'Writing',type:'number'},{path:'config.celpipS',label:'Speaking',type:'number'}]},
      score:{title:'Credit Score',fields:[{path:'config.score',label:'Latest score',type:'number'}]},
      card:{title:'Credit Card',fields:[{path:'config.cardBal',label:'Balance ($)',type:'number'},{path:'config.cardLimit',label:'Limit ($)',type:'number'}]},
      efund:{title:'Emergency Fund',fields:[{path:'config.efund',label:'Balance ($)',type:'number'}]},
      budgetLeft:{title:'Budget Left',fields:[{path:'config.budgetLeft',label:'Amount left ($)',type:'number'}]},
      rentDay:{title:'Rent Due Day',fields:[{path:'config.rentDay',label:'Day of month (1–31)',type:'number'}]},
      ccDay:{title:'Card Due Day',fields:[{path:'config.ccDay',label:'Day of month (1–31)',type:'number'}]},
      treats:{title:'Guilt-Free Treats',fields:[{path:'config.treatsClaimed',label:'Treats used so far (1 earned per level-up)',type:'number'}]},
    };
    function openModal(key){
      const spec=EDITS[key]; if(!spec) return;
      modalSpec=spec;
      const ov=document.createElement('div'); ov.className='overlay'; ov.id='dashModal';
      ov.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-label="${spec.title}">
        <header>Amendment — ${spec.title}</header>
        <div class="body">
          ${spec.fields.map((f,i)=>`<label for="mf${i}">${f.label}</label>
            <input id="mf${i}" type="${f.type}" value="${getPath(Dash.state,f.path)??''}" ${f.type==='number'?'inputmode="decimal"':''}>`).join('')}
          <div class="mBtns"><button class="cancel" data-mclose>Cancel</button><button class="save" data-msave>Stamp It</button></div>
        </div></div>`;
      ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(); });
      ov.querySelector('[data-mclose]').onclick=closeModal;
      ov.querySelector('[data-msave]').onclick=saveModal;
      document.body.appendChild(ov);
      const first=ov.querySelector('input'); if(first) first.focus();
    }
    function closeModal(){ const m=document.getElementById('dashModal'); if(m) m.remove(); modalSpec=null; }
    function saveModal(){
      if(!modalSpec) return;
      modalSpec.fields.forEach((f,i)=>{
        const el=document.getElementById('mf'+i); if(!el) return;
        let v=el.value;
        v = f.type==='number' ? (parseFloat(String(v).replace(/[^0-9.\-]/g,''))||0) : String(v).trim();
        Dash.set(f.path,v);
      });
      closeModal();
    }
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

    function flowToast(msg){
      // FLOWSTATE celebration: a quiet glow, never noise. No confetti, no
      // failure counterpart — negative events simply don't get theatre.
      const toast=document.createElement('div'); toast.className='toast'; toast.setAttribute('role','status');
      toast.textContent=msg;
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(), 2600);
    }

    function draw(s){
      const root=document.getElementById('appRoot');
      const d=(s.days&&s.days[Dash.today])||{};
      const anchoredNow=d.anchor===true;
      const bigNow=BIG_KEYS.filter(k=>d[k]===true).length;

      root.innerHTML =
        (tab==='today'?todayHTML(s,d)
        :tab==='plan'?schedHTML(s)
        :tab==='pr'?prHTML(s)
        :tab==='money'?moneyHTML(s)
        :tab==='history'?historyHTML(s)
        :healthHTML()) + navHTML();

      root.querySelectorAll('[data-toggle]').forEach(el=>{
        const fire=()=>{
          const path=el.dataset.toggle;
          const cur=getPath(Dash.state,path);
          // Timetable blocks keep a neutral three-state (done / skip / clear)
          // for honest plan tracking; everything else is a simple on/off —
          // there is no DENIED state anywhere anymore.
          const next = path.includes('.sched.')
            ? (cur===true ? 'fail' : cur==='fail' ? false : true)
            : cur===true ? false : true;
          Dash.set(path,next);
        };
        el.addEventListener('click',fire);
        el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fire(); } });
      });
      root.querySelectorAll('[data-time]').forEach(inp=>{
        inp.addEventListener('click',e=>e.stopPropagation());
        inp.addEventListener('keydown',e=>e.stopPropagation());
        inp.addEventListener('change',()=>Dash.set(inp.dataset.time, inp.value));
      });
      root.querySelectorAll('[data-edit]').forEach(el=>{
        el.addEventListener('click',()=>{
          if(el.dataset.edit==='actionsCount'){
            const card=document.getElementById('actionCard');
            if(card){ window.scrollTo({top:card.offsetTop-70, behavior:REDUCED?'auto':'smooth'});
              card.style.outline='3px solid var(--foil)'; setTimeout(()=>card.style.outline='',1200); }
            return;
          }
          openModal(el.dataset.edit);
        });
      });
      root.querySelectorAll('[data-fine]').forEach(el=>{
        const fire=()=>{
          const cur=(getPath(Dash.state,`days.${Dash.today}.fines`)||[]).slice();
          cur.push(el.dataset.fine);
          Dash.set(`days.${Dash.today}.fines`,cur);
        };
        el.addEventListener('click',fire);
        el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fire(); } });
      });
      const undoBtn=root.querySelector('[data-fineundo]');
      if(undoBtn) undoBtn.addEventListener('click',e=>{
        e.stopPropagation();
        const cur=(getPath(Dash.state,`days.${Dash.today}.fines`)||[]).slice();
        cur.pop();
        Dash.set(`days.${Dash.today}.fines`,cur);
      });
      root.querySelectorAll('[data-plday]').forEach(el=>{
        el.addEventListener('click',()=>{ planDay=el.dataset.plday; draw(Dash.state); });
      });
      root.querySelectorAll('[data-hday]').forEach(el=>{
        el.addEventListener('click',()=>openDayModal(el.dataset.hday));
      });
      root.querySelectorAll('[data-tab]').forEach(el=>{
        el.addEventListener('click',()=>{ tab=el.dataset.tab; draw(Dash.state); window.scrollTo({top:0}); });
      });
      const pushBtn=root.querySelector('#pushEnable');
      if(pushBtn) pushBtn.addEventListener('click', async ()=>{
        const msg=root.querySelector('#pushMsg'); if(msg) msg.textContent='Registering this device…';
        const r=await ensurePushToken(true);
        if(r.ok){
          // Success re-renders (token saved via Dash.set) and hides the card — confirm with a toast.
          const t=document.createElement('div'); t.className='toast'; t.setAttribute('role','status');
          t.textContent='🔔 Notifications on — brief lands at 7 AM.';
          document.body.appendChild(t); setTimeout(()=>t.remove(),3200);
        } else if(msg){
          msg.textContent = r.reason==='denied' ? 'Blocked — allow notifications for this site in Chrome settings, then retry.'
            : r.reason==='unsupported' ? "This browser doesn't support web push."
            : r.reason==='setup' ? 'Push isn\'t configured yet — VAPID key missing (see NOTIFICATIONS-SETUP.md).'
            : 'Couldn\'t register — check your connection and retry.';
        }
      });

      if(prevAnchor===false && anchoredNow) flowToast(`⚓ Day counted — momentum ${momentumNow(s)}`);
      if(prevBig!==null && bigNow>prevBig) flowToast(`⚡ Big win — momentum ${momentumNow(s)}`);
      prevAnchor=anchoredNow;
      prevBig=bigNow;
    }

    Dash.render(draw);
  })();
}
</script>
</body>
</html>
