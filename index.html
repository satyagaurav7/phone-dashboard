<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14213D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mission Control">
<title>Satya · Mission Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Public+Sans:wght@400;600;700&family=B612+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* — token palette: "Road to PR" passport/customs — */
    --passport:#14213D;   /* navy passport cover   */
    --page:#ECF0F6;       /* pale guilloche page   */
    --ink:#1C2B4A;        /* document ink          */
    --maple:#C8271C;      /* maple red stamp ink   */
    --customs:#1F7A4D;    /* approved-stamp green  */
    --foil:#C9A227;       /* gold foil             */
    --line:#C9D3E4; --sub:#51618A; --card:#FFFFFF;
    --disp:'Barlow Condensed',ui-sans-serif,sans-serif;
    --body:'Public Sans',system-ui,sans-serif;
    --mono:'B612 Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      repeating-radial-gradient(circle at 50% -60%, rgba(20,33,61,.05) 0 1px, transparent 1px 12px),
      var(--page);
    color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.5;
    -webkit-tap-highlight-color:transparent;
  }
  #appRoot{max-width:780px;margin:0 auto;padding:14px 14px calc(104px + env(safe-area-inset-bottom));display:none}
  button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer;text-align:left}
  :focus-visible{outline:3px solid var(--foil);outline-offset:2px;border-radius:4px}

  /* ============ hero (passport cover) ============ */
  .cover{background:var(--passport);border-radius:10px;color:#fff;padding:18px 18px 0;
    border-top:4px solid var(--foil);border-bottom:4px solid var(--foil);overflow:hidden}
  .cover .kicker{font-family:var(--disp);font-weight:600;letter-spacing:.22em;font-size:13px;color:var(--foil);text-transform:uppercase}
  .cover h1{font-family:var(--disp);font-weight:700;font-size:30px;margin:2px 0 0;letter-spacing:.02em;text-transform:uppercase}
  .cover .date{font-family:var(--mono);font-size:12.5px;color:#B9C6DE;margin-top:3px}
  .heroRow{display:flex;gap:18px;align-items:center;flex-wrap:wrap;padding:16px 0 14px}
  .streakBig{font-family:var(--mono);font-weight:700;font-size:52px;line-height:1;color:#fff}
  .streakLbl{font-family:var(--disp);font-weight:600;letter-spacing:.18em;font-size:13px;color:#B9C6DE;text-transform:uppercase}
  .bestLbl{font-family:var(--mono);font-size:12.5px;color:var(--foil);margin-top:6px}
  .statusLine{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:.04em;color:#EAD9A0;padding:0 0 14px}
  .mrz{background:#fff;color:var(--passport);font-family:var(--mono);font-size:12px;letter-spacing:2px;
    padding:8px 12px;margin:0 -18px;white-space:nowrap;overflow:hidden;border-top:2px dashed var(--line)}
  #syncStatus{font-family:var(--mono);font-size:11px;color:var(--foil);opacity:.85;margin-top:2px}
  .xpWrap{padding:0 0 14px}
  .xpTop{display:flex;justify-content:space-between;font-family:var(--disp);font-weight:600;letter-spacing:.14em;font-size:12px;color:var(--foil);text-transform:uppercase;margin-bottom:5px}
  .xpBar{height:8px;background:rgba(255,255,255,.14);border-radius:4px;overflow:hidden}
  .xpFill{height:100%;background:var(--foil)}
  .xpSub{font-family:var(--mono);font-size:11px;color:#B9C6DE;margin-top:4px}

  /* ============ form cards ============ */
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:8px;padding:16px;margin-top:14px}
  .secTitle{display:flex;align-items:baseline;gap:8px;margin:0 0 12px}
  .secTitle .no{font-family:var(--mono);font-size:11px;color:var(--sub)}
  .secTitle h2{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.14em;text-transform:uppercase;margin:0}
  .secTitle .tally{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:13px}

  /* stamp rows */
  .row{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:1.5px solid var(--line);
    border-radius:6px;margin-bottom:8px;background:#FBFCFE;cursor:pointer;user-select:none;transition:background .15s}
  .row:active{transform:scale(.99)}
  .row .emo{font-size:19px;flex:0 0 auto}
  .row .lbl{font-weight:600;font-size:15.5px}
  .row .subt{font-size:12.5px;color:var(--sub);font-weight:400;margin-top:1px}
  .row .spacer{flex:1}
  .stamp{flex:0 0 auto;font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.08em;
    border:2px dashed #A7B4CC;color:var(--sub);border-radius:6px;padding:7px 10px;transform:rotate(0)}
  .row.done{background:rgba(31,122,77,.07);border-color:rgba(31,122,77,.45)}
  .row.done .stamp{border:2px solid var(--customs);box-shadow:inset 0 0 0 1.5px #fff,inset 0 0 0 3px rgba(31,122,77,.35);
    color:var(--customs);background:rgba(31,122,77,.06);transform:rotate(-5deg);animation:slam .28s cubic-bezier(.2,1.6,.5,1)}
  .row.navyInk.done{background:rgba(20,33,61,.05);border-color:rgba(20,33,61,.4)}
  .row.navyInk.done .stamp{border-color:var(--passport);box-shadow:inset 0 0 0 1.5px #fff,inset 0 0 0 3px rgba(20,33,61,.3);color:var(--passport);background:rgba(20,33,61,.04)}
  .row.mapleInk.done{background:rgba(200,39,28,.05);border-color:rgba(200,39,28,.4)}
  .row.mapleInk.done .stamp{border-color:var(--maple);box-shadow:inset 0 0 0 1.5px #fff,inset 0 0 0 3px rgba(200,39,28,.3);color:var(--maple);background:rgba(200,39,28,.04)}
  .row.fail{background:rgba(200,39,28,.07);border-color:rgba(200,39,28,.55)}
  .row.fail .lbl{color:var(--maple)}
  .row.fail .stamp{border:2px solid var(--maple);color:#fff;background:var(--maple);transform:rotate(4deg);animation:slam .28s cubic-bezier(.2,1.6,.5,1)}
  @keyframes slam{0%{transform:rotate(9deg) scale(1.7);opacity:0}60%{transform:rotate(-7deg) scale(.95);opacity:1}100%{transform:rotate(-5deg) scale(1)}}
  .timeWrap{display:flex;align-items:center;gap:6px;flex:0 0 auto;margin-right:2px}
  .timeWrap input{font-family:var(--mono);font-size:13px;border:1.5px solid var(--line);border-radius:5px;padding:5px 6px;color:var(--ink);background:#fff}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13px;border:1.5px solid var(--line);background:#FBFCFE;border-radius:4px;padding:8px 12px;color:var(--ink)}
  .chip b{color:var(--passport)}

  /* tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .tile{border:1.5px solid var(--line);background:#FBFCFE;border-radius:8px;padding:14px;position:relative;cursor:pointer;transition:border-color .15s;width:100%}
  .tile:hover{border-color:var(--passport)}
  .tile .dot{position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;box-shadow:inset 0 0 0 2px #fff}
  .tile .big{font-family:var(--mono);font-weight:700;font-size:30px;line-height:1.05}
  .tile .cap{font-family:var(--disp);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:12.5px;color:var(--sub);margin-top:7px}
  .tile .amend{font-family:var(--mono);font-size:10.5px;color:var(--passport);margin-top:6px;opacity:.75}
  .t-good .big{color:var(--customs)} .t-warn .big{color:#8A5A00} .t-bad .big{color:var(--maple)} .t-idle .big{color:var(--ink)}
  .d-good{background:var(--customs)} .d-warn{background:#C98A00} .d-bad{background:var(--maple)} .d-idle{background:#8FA0BF}

  /* two-up on wide screens */
  .grid2{display:grid;grid-template-columns:1fr;gap:0}
  @media(min-width:760px){ .grid2{grid-template-columns:1fr 1fr;gap:14px;align-items:start} .grid2 > .card{margin-top:14px} }

  /* health */
  .hcard p{margin:6px 0 0;font-size:14.5px;color:var(--ink)}
  .hcard .sub{color:var(--sub);font-size:13px}

  /* ============ history heatmap ============ */
  .hmWrap{overflow-x:auto;padding-bottom:4px}
  .hmMonths{display:flex;gap:3px;height:14px;margin:0 0 4px;font-family:var(--mono);font-size:10px;color:var(--sub)}
  .hmMonths span{width:13px;flex:0 0 auto;overflow:visible;white-space:nowrap}
  .hmGrid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,13px);grid-auto-columns:13px;gap:3px}
  .hmCell{width:13px;height:13px;border-radius:3px;border:1px solid var(--line);background:#FBFCFE;padding:0;cursor:pointer}
  .hmCell.part{background:#E7C46A;border-color:#C98A00}
  .hmCell.full{background:var(--customs);border-color:var(--customs)}
  .hmCell.fail{background:var(--maple);border-color:var(--maple)}
  .hmCell.today{outline:2px solid var(--passport);outline-offset:1px}
  .hmDow{display:grid;grid-template-rows:repeat(7,13px);gap:3px;margin:18px 6px 0 0;font-family:var(--mono);font-size:9px;color:var(--sub);flex:0 0 auto}
  .hmLegend{display:flex;gap:12px;align-items:center;margin-top:10px;font-size:12px;color:var(--sub);flex-wrap:wrap}
  .hmLegend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}

  /* ============ bottom nav ============ */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--passport);border-top:3px solid var(--foil);padding-bottom:env(safe-area-inset-bottom)}
  .navIn{max-width:780px;margin:0 auto;display:flex}
  .navBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;color:#8FA0BF;position:relative}
  .navBtn .nEmo{font-size:19px;line-height:1}
  .navBtn .nLbl{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .navBtn.on{color:#fff}
  .navBtn.on::after{content:"";position:absolute;top:-3px;left:22%;right:22%;height:3px;background:var(--foil)}

  /* ============ modal ============ */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(20,33,61,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{width:100%;max-width:340px;background:#fff;border-radius:8px;border:1.5px solid var(--line);overflow:hidden;animation:mIn .22s cubic-bezier(.3,1.4,.6,1)}
  @keyframes mIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
  .modal header{background:var(--passport);color:#fff;padding:12px 16px;font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:14.5px}
  .modal .body{padding:16px}
  .modal label{display:block;font-family:var(--disp);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:12px;color:var(--sub);margin:0 0 5px}
  .modal input{width:100%;font-family:var(--mono);font-size:16px;padding:10px 12px;border:1.5px solid var(--line);border-radius:6px;color:var(--ink);margin-bottom:14px;background:#FBFCFE}
  .modal input:focus{outline:none;border-color:var(--passport)}
  .mBtns{display:flex;gap:10px}
  .mBtns .cancel{flex:1;text-align:center;padding:11px;border:1.5px solid var(--line);border-radius:6px;color:var(--sub);font-weight:600}
  .mBtns .save{flex:1;text-align:center;padding:11px;border-radius:6px;background:var(--customs);color:#fff;font-weight:700;font-family:var(--disp);letter-spacing:.12em;text-transform:uppercase}

  /* ============ celebration ============ */
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;background:var(--passport);color:#fff;
    border:2px solid var(--foil);border-radius:8px;padding:12px 18px;font-weight:700;font-size:15px;white-space:nowrap;
    box-shadow:0 10px 30px rgba(20,33,61,.35);animation:tIn .35s cubic-bezier(.3,1.5,.6,1)}
  @keyframes tIn{from{opacity:0;transform:translate(-50%,-16px)}to{opacity:1;transform:translate(-50%,0)}}
  .burstBox{position:fixed;top:66px;left:50%;width:0;height:0;z-index:75;pointer-events:none}
  .pc{position:absolute;left:0;top:0;font-size:15px;animation:fly 1.3s ease-out forwards}
  .pcSq{position:absolute;left:0;top:0;width:8px;height:8px;border-radius:1px;animation:fly 1.3s ease-out forwards}
  @keyframes fly{from{opacity:1;transform:translate(0,0) rotate(0)}to{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--rot))}}
  .lockCard{position:fixed;inset:0;z-index:78;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .lockCard .inner{background:#fff;border:4px double var(--maple);color:var(--maple);border-radius:10px;padding:22px 30px;
    font-family:var(--mono);font-weight:700;font-size:20px;letter-spacing:.1em;transform:rotate(-6deg);text-align:center}

  /* ============ auth gate ============ */
  #authGate{
    max-width:360px;margin:14vh auto 0;background:var(--card);border:1.5px solid var(--line);
    border-radius:10px;padding:32px 28px;box-shadow:0 18px 40px -18px rgba(20,33,61,.35);text-align:center;
    border-top:4px solid var(--foil);animation:mIn .3s cubic-bezier(.3,1.4,.6,1)
  }
  #authGate .lock{font-size:34px}
  #authGate h2{margin:14px 0 4px;font-family:var(--disp);font-weight:700;font-size:20px;color:var(--passport);letter-spacing:.02em;text-transform:uppercase}
  #authGate .sub{color:var(--sub);font-size:14px;margin:0 0 20px}
  #authGate input{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:6px;font-size:16px;
    margin-bottom:12px;background:#FBFCFE;color:var(--ink);font-family:var(--mono)
  }
  #authGate input:focus{outline:none;border-color:var(--passport)}
  #authGate button{
    width:100%;padding:13px;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;
    color:#fff;background:var(--passport);font-family:var(--disp);letter-spacing:.12em;text-transform:uppercase;transition:filter .16s
  }
  #authGate button:hover{filter:brightness(1.2)}
  #authGate button:disabled{opacity:.6;cursor:default}
  #authGate .err{color:var(--maple);font-size:13.5px;margin-top:12px;min-height:18px}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
  <div id="authGate">
    <div class="lock">🔒</div>
    <h2>Welcome back, Satya</h2>
    <p class="sub">Enter your password to open Mission Control.</p>
    <input type="password" id="authPass" placeholder="Password" autocomplete="current-password">
    <button id="authSubmit">Unlock</button>
    <div class="err" id="authErr"></div>
  </div>

  <div id="appRoot" aria-live="polite"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiFSwmMc-qYYtXgsiaENQ3nRBBrmy7dc8",
  authDomain: "newt-90ca4.firebaseapp.com",
  projectId: "newt-90ca4",
  storageBucket: "newt-90ca4.firebasestorage.app",
  messagingSenderId: "772443408217",
  appId: "1:772443408217:web:fa78c2bb719a883e382e48"
};
const AUTH_EMAIL = 'booms.satya@gmail.com';

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const authGate = document.getElementById('authGate');
const appRoot = document.getElementById('appRoot');
const authPass = document.getElementById('authPass');
const authErr = document.getElementById('authErr');
const authSubmit = document.getElementById('authSubmit');

authSubmit.onclick = async () => {
  authErr.textContent = '';
  const pass = authPass.value;
  if (!pass) { authErr.textContent = 'Enter the password.'; return; }
  authSubmit.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, AUTH_EMAIL, pass);
  } catch (e) {
    const codeMap = {
      'auth/invalid-credential': 'Wrong password.',
      'auth/wrong-password': 'Wrong password.',
      'auth/user-not-found': 'Account not found — check the Firebase console setup.',
      'auth/too-many-requests': 'Too many attempts. Wait a bit and try again.',
      'auth/network-request-failed': 'Network error — check your connection.',
      'auth/user-disabled': 'This account is disabled in Firebase console.'
    };
    authErr.textContent = (codeMap[e.code] || ('Error: ' + e.code));
  }
  authSubmit.disabled = false;
};
authPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') authSubmit.click(); });

onAuthStateChanged(auth, async (user) => {
  if (user && user.email === AUTH_EMAIL) {
    authGate.style.display = 'none';
    appRoot.style.display = 'block';
    await initApp();
  } else if (user) {
    // Leftover session from an older version of this app (e.g. anonymous auth) — clear it.
    await signOut(auth);
  } else {
    appRoot.style.display = 'none';
    authGate.style.display = 'block';
    authPass.value = '';
  }
});

async function initApp(){
  const userDocRef = doc(db, 'dashboard', 'satya');
  const KEY = 'satya_daily_web';
  const todayStr = d => { d = d || new Date(); return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10); };
  const addDays = (s,n) => { const d = new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return todayStr(d); };
  const T = todayStr();

  const blankDay = () => ({smokefree:false,gym:false,language:false,cooked:false,sleep:false,study:false,money:false,meditate:false,breakfast:false,lunch:false,dinner:false,insulin:false,omega3:false,creatine:false,bonehealth:false,vitcd:false,fines:[],completed:false});

  let S = {};
  try { const raw = localStorage.getItem(KEY); S = raw ? JSON.parse(raw) : {}; } catch(e) { S = {}; }

  function normalize(){
    S.config = Object.assign({permit:"2027-01-31",celpipExam:"2026-08-15",cecDate:"2026-10-01",celpipL:10,celpipR:6,celpipW:11,celpipS:11,rentDay:1,ccDay:14,score:0,cardBal:0,cardLimit:0,efund:0,budgetLeft:0,treatsClaimed:0}, S.config||{});
    S.actions = Object.assign({oinp:false,wfg:false,carfax:false,pcc:false,celpip:false,innobox:false,resume:false,permitdoc:false}, S.actions||{});
    S.days = S.days || {};
    S.streak = S.streak || 0; S.best = S.best || 0; S.lastComplete = S.lastComplete || null;
    S.days[T] = Object.assign(blankDay(), S.days[T]||{});
  }
  normalize();

  const syncEl = () => document.getElementById('syncStatus');
  const setSyncUI = (text) => { const el = syncEl(); if (el) el.textContent = text; };

  try {
    setSyncUI('Loading…');
    const snap = await getDoc(userDocRef);
    if (snap.exists()) { S = snap.data(); }
    normalize();
    setSyncUI('Synced');
  } catch (e) {
    setSyncUI('On this device');
  }

  const saveLocal = () => { try { localStorage.setItem(KEY, JSON.stringify(Dash.state)); } catch(e) {} };
  const saveCloud = async () => {
    try { setSyncUI('Saving…'); await setDoc(userDocRef, Dash.state, { merge:false }); setSyncUI('Synced'); }
    catch(e) { setSyncUI('Saved on this device'); }
  };

  const CORE = ['smokefree','gym','language','cooked','sleep'];
  const getPath = (o,p) => String(p).split('.').reduce((a,k)=>a==null?a:a[k], o);

  window.Dash = {
    today: T,
    state: S,
    _fn: null,
    set(path, value){
      const parts = String(path).split('.'); let o = this.state;
      for (let i=0; i<parts.length-1; i++){ if (o[parts[i]] == null) o[parts[i]] = {}; o = o[parts[i]]; }
      o[parts[parts.length-1]] = value;
      const d = this.state.days[this.today] || {};
      if (CORE.every(k => d[k] === true) && !d.completed) {
        d.completed = true;
        d.prevStreak = { streak: this.state.streak, best: this.state.best, lastComplete: this.state.lastComplete };
        this.state.streak = (this.state.lastComplete === addDays(this.today,-1)) ? this.state.streak+1 : 1;
        this.state.lastComplete = this.today;
        this.state.best = Math.max(this.state.best, this.state.streak);
      } else if (d.completed && !CORE.every(k => d[k] === true)) {
        // A core item was un-done or denied after the day locked — revert the lock honestly.
        d.completed = false;
        if (d.prevStreak) {
          this.state.streak = d.prevStreak.streak;
          this.state.best = d.prevStreak.best;
          this.state.lastComplete = d.prevStreak.lastComplete;
          delete d.prevStreak;
        } else {
          this.state.streak = Math.max(0, this.state.streak - 1);
          this.state.lastComplete = this.state.streak > 0 ? addDays(this.today,-1) : null;
        }
      }
      saveLocal(); saveCloud();
      if (this._fn) this._fn(this.state);
    },
    render(fn){ this._fn = fn; fn(this.state); }
  };
  saveLocal();

          <div style="font-size:12.5px;color:var(--sub);margin-top:8px">You are <b>not</b> broke — you're building. ~$14k in assets at 26, as a newcomer. The June problem was cash-flow discipline, not lack of money. Snapshot from your screenshots; tap a Numbers tile to keep the live ones current.</div>
        </div>
        <div class="card">
          ${secTitle('AUDIT','June Reality Check','51.7% of pay','var(--maple)')}
          ${li('Food delivery — 25 Uber Eats orders','$497',1)}
          ${li('Dining out + coffee (20 Tims runs)','$429',1)}
          ${li('Groceries — actual food at home','$155')}
          ${li('Car rentals ×4 weekends + gas','$835',1)}
          ${li('Uber rides — 27 trips','$280',1)}
          ${li('Subscriptions ×9 (three AI tools)','$160',1)}
          ${li('Cannabis — 7 buys','$59',1)}
          <div style="display:flex;justify-content:space-between;gap:10px;padding:9px 2px 2px;font-size:14.5px;font-weight:700"><span>Food + wheels vs net pay $4,249</span><b style="font-family:var(--mono);color:var(--maple)">$2,196 · 52%</b></div>
          <div style="font-size:12.5px;color:var(--sub);margin-top:8px">From your real CIBC statements, June 1 – July 2. Half a paycheque went to convenience. Groceries were only $155 of $1,081 total food spend.</div>
        </div>
        <div class="card">
          ${secTitle('PLAN','Monthly Envelopes','net $4,249')}
          ${li('Mom — loan support. First after rent. Non-negotiable.','$2,000')}
          ${li('Rent (Centurion, 1st)','$930')}
          ${li('Equitable Life TFSA — savings, not an expense ✓','$400')}
          ${li('Fixed: phone + insulin/pharmacy + bank fee','$140')}
          ${li('Groceries — this replaces delivery','$350')}
          ${li('Transport — bus pass first, no casual Ubers','$150')}
          ${li('Fun + earned treats ($50/level-up from here)','$60')}
          ${li('Subscriptions — Spotify + ONE AI tool','$40')}
          ${li('Cannabis — taper envelope, cash only','$20')}
          <div style="display:flex;justify-content:space-between;gap:10px;padding:9px 2px 2px;font-size:14.5px;font-weight:700"><span>Buffer / e-fund top-up</span><b style="font-family:var(--mono);color:var(--customs)">~$159</b></div>
          <div style="font-size:12.5px;color:var(--sub);margin-top:8px">You already save $400/mo into the Equitable TFSA — that's real. $2,000 to mom + $400 savings on $4,249 is tight but honest. The only slack is delivery money you don't spend. Every skipped Uber Eats order = a real dollar toward the buffer.</div>
          <div class="chips" style="margin-top:12px">
            <span class="chip"><b>Uber Eats = $0.</b> Delete the app</span>
            <span class="chip"><b>Rentals:</b> only from an earned treat + fun envelope</span>
            <span class="chip"><b>Payday order:</b> mom → rent → e-fund → rest</span>
            <span class="chip"><b>Tims cap</b> $20/mo — brew at home</span>
            <span class="chip"><b>One AI sub</b> — cancel the rest</span>
            <span class="chip"><b>Level-up =</b> 1 guilt-free treat · $50 cap</span>
            <span class="chip"><b>24h rule</b> on any new money product</span>
          </div>
        </div>
        <div class="card">
          ${secTitle('WATCH','Flags From Your Statements','act this week','var(--maple)')}
          ${li('WFG charged your card Jul 2 — while the $0-balance dispute is open. Demand a written explanation.','$271.20',1)}
          ${li('CIBC account fee — switch plan or meet the waiver minimum.','$16.95/mo',1)}
          ${li('DashPass subscription while “No Uber Eats” is your core habit. Cancel today.','$11.29/mo',1)}
          ${li('CIBC Payment Protector on the Visa — balance insurance is usually poor value. Review dropping it.','review',1)}
          ${li('CIBC-DISATF — $200 draft twice a month, unlabeled. Find out exactly what it is.','$200 ×2',1)}
          <div style="font-size:12.5px;color:var(--sub);margin-top:8px">Card is basically at zero (−$158 credit, they owe you). The $504 Hertz was a <b>hold</b> — ~$350 releases, real rental ~$150. Your card habit is genuinely good; the leak is lifestyle, not debt.</div>
        </div>`;
    }

    function statTile(big,cap,tone){
      return `<div class="tile t-${tone}" style="cursor:default"><span class="dot d-${tone}" aria-hidden="true"></span><div class="big">${big}</div><div class="cap">${cap}</div></div>`;
    }

    function historyHTML(s){
      const CORE7=['smokefree','gym','language','cooked','sleep'];
      const days=s.days||{};
      const dayStat=k=>{const d=days[k];if(!d)return 'none';
        if(CORE7.some(x=>d[x]==='fail'))return 'fail';
        const n=CORE7.filter(x=>d[x]===true).length;
        if(d.completed===true||n===CORE7.length)return 'full';
        return n>0?'part':'none';};
      const pctOver=n=>{let c=0;for(let i=0;i<n;i++){const d=days[addDaysStr(Dash.today,-i)];if(d&&d.completed===true)c++;}return Math.round(c/n*100);};
      const p7=pctOver(7),p30=pctOver(30);

      const WEEKS=16;
      let start=addDaysStr(Dash.today,-(WEEKS*7-1));
      const sdow=(new Date(start+'T00:00:00').getDay()+6)%7;
      start=addDaysStr(start,-sdow);
      const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let cells='',months='';
      for(let w=0;;w++){
        const wk=addDaysStr(start,w*7);
        if(wk>Dash.today)break;
        const wd=new Date(wk+'T00:00:00');
        months+=`<span>${wd.getDate()<=7?MON[wd.getMonth()]:''}</span>`;
        for(let r=0;r<7;r++){
          const ds=addDaysStr(start,w*7+r);
          if(ds>Dash.today){cells+='<span></span>';continue;}
          const st=dayStat(ds);
          const nice=new Date(ds+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'});
          cells+=`<button class="hmCell ${st==='none'?'':st}${ds===Dash.today?' today':''}" data-hday="${ds}" aria-label="${nice}: ${st==='full'?'day locked':st==='fail'?'entry refused':st==='part'?'partial entries':'no entries'}" title="${nice}"></button>`;
        }
      }
      const DOW=['M','','W','','F','',''];
      const xp=calcXP(s), lv=levelInfo(xp);
      return `
        <div class="card">
          ${secTitle('RECORD','The Record')}
          <div class="tiles">
            ${statTile(xp,'visa points',xp>0?'good':'idle')}
            ${statTile('L'+(lv.idx+1),lv.name,'idle')}
            ${statTile('🔥 '+s.streak,'current streak',s.streak>0?'good':'idle')}
            ${statTile(s.best,'best ever',s.best>0?'good':'idle')}
            ${statTile(p7+'%','locked · last 7 days',p7>=70?'good':p7>=40?'warn':'bad')}
            ${statTile(p30+'%','locked · last 30 days',p30>=70?'good':p30>=40?'warn':'bad')}
          </div>
        </div>
        <div class="card">
          ${secTitle('LOG','Travel History','16 weeks')}
          <div class="hmWrap">
            <div style="display:flex">
              <div class="hmDow">${DOW.map(x=>`<span>${x}</span>`).join('')}</div>
              <div>
                <div class="hmMonths">${months}</div>
                <div class="hmGrid">${cells}</div>
              </div>
            </div>
          </div>
          <div class="hmLegend">
            <span><i style="background:var(--customs)"></i>Locked</span>
            <span><i style="background:#E7C46A"></i>Partial</span>
            <span><i style="background:var(--maple)"></i>Refused</span>
            <span><i style="background:#FBFCFE;border:1px solid var(--line)"></i>Empty</span>
          </div>
          <div style="font-size:12.5px;color:var(--sub);margin-top:8px">Tap any day to inspect or amend its entries.</div>
        </div>`;
    }

    function openDayModal(dstr){
      const ov=document.createElement('div'); ov.className='overlay'; ov.id='dashModal';
      const niceDate=new Date(dstr+'T00:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});
      const groups=[
        ['Daily Wins',WINS.map(([k,e,l])=>[k,e,l])],
        ['Growth',GROWTH.map(([k,e,l])=>[k,e,l])],
        ['Fuel',FUEL.map(([k,e,l])=>[k,e,l])],
        ['Supplements',SUPPS.map(([k,l])=>[k,'💊',l])],
      ];
      const render=()=>{
        const d=Dash.state.days[dstr]||{};
        const rowsHtml=groups.map(([g,items])=>
          `<div style="font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:12px;color:var(--sub);margin:10px 0 6px">${g}</div>`+
          items.map(([k,e,l])=>{
            const st=d[k];
            const cls=st===true?'done':st==='fail'?'fail':'';
            const stamp=st===true?'DONE ✓':st==='fail'?'DENIED ✗':'STAMP';
            return `<div class="row ${cls}" role="button" tabindex="0" aria-label="${l}: ${st===true?'done':st==='fail'?'denied':'not stamped'}" data-hedit="${k}" style="padding:8px 10px;margin-bottom:6px">
              <span class="emo" aria-hidden="true">${e}</span><span class="lbl" style="font-size:14px">${l}</span><span class="spacer"></span><span class="stamp" style="font-size:10.5px;padding:5px 8px">${stamp}</span></div>`;
          }).join('')
        ).join('');
        ov.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-label="Entry ${niceDate}">
          <header>Entry — ${niceDate}</header>
          <div class="body" style="max-height:62vh;overflow-y:auto">
            ${rowsHtml}
            <div class="mBtns" style="margin-top:12px"><button class="cancel" data-mclose>Close</button></div>
          </div></div>`;
        ov.querySelector('[data-mclose]').onclick=()=>ov.remove();
        ov.querySelectorAll('[data-hedit]').forEach(el=>{
          const fire=()=>{
            const k=el.dataset.hedit;
            const cur=(Dash.state.days[dstr]||{})[k];
            const next=cur===true?'fail':cur==='fail'?false:true;
            Dash.set(`days.${dstr}.${k}`,next);
            render();
          };
          el.addEventListener('click',fire);
          el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fire();}});
        });
      };
      ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
      render();
      document.body.appendChild(ov);
    }

    function healthHTML(){
      return `
        <div class="card hcard">
          ${secTitle('MED','Type 1 Diabetes')}
          <p><b>NovoRapid</b> (bolus) + <b>Lantus</b> (basal) · CGM: Dexcom / Libre.</p>
          <p class="sub">Keep insulin timing steady · cut smoking — the quiet long-term wins.</p>
        </div>
        <div class="card hcard">
          ${secTitle('CLAIM','Disability Tax Credit')}
          <p>💡 T1D usually qualifies — refund <b>+ RDSP access</b>. Apply.</p>
        </div>
        <div class="card hcard">
          ${secTitle('NOTE','Daily checks')}
          <p class="sub">Insulin + meal stamps live on the <b>Today</b> tab — the streak <i>is</i> the medicine schedule. Not medical advice — loop in your diabetes team for anything clinical.</p>
        </div>`;
    }

    const TABS=[['today','✓','Today'],['pr','🍁','PR'],['money','💵','Money'],['health','🩺','Health'],['history','🗓️','History']];
    function navHTML(){
      return `<nav aria-label="Sections"><div class="navIn">${TABS.map(([k,e,l])=>
        `<button class="navBtn ${tab===k?'on':''}" data-tab="${k}" aria-current="${tab===k}"><span class="nEmo" aria-hidden="true">${e}</span><span class="nLbl">${l}</span></button>`).join('')}</div></nav>`;
    }

    const EDITS={
      permit:{title:'Work Permit Expiry',fields:[{path:'config.permit',label:'Expiry date',type:'date'}]},
      celpipExam:{title:'CELPIP Retest',fields:[{path:'config.celpipExam',label:'Exam date',type:'date'}]},
      cec:{title:'CEC Eligibility',fields:[{path:'config.cecDate',label:'Eligibility date (1 yr Canadian work)',type:'date'}]},
      celpipScores:{title:'CELPIP Scores',fields:[{path:'config.celpipL',label:'Listening',type:'number'},{path:'config.celpipR',label:'Reading',type:'number'},{path:'config.celpipW',label:'Writing',type:'number'},{path:'config.celpipS',label:'Speaking',type:'number'}]},
      score:{title:'Credit Score',fields:[{path:'config.score',label:'Latest score',type:'number'}]},
      card:{title:'Credit Card',fields:[{path:'config.cardBal',label:'Balance ($)',type:'number'},{path:'config.cardLimit',label:'Limit ($)',type:'number'}]},
      efund:{title:'Emergency Fund',fields:[{path:'config.efund',label:'Balance ($)',type:'number'}]},
      budgetLeft:{title:'Budget Left',fields:[{path:'config.budgetLeft',label:'Amount left ($)',type:'number'}]},
      rentDay:{title:'Rent Due Day',fields:[{path:'config.rentDay',label:'Day of month (1–31)',type:'number'}]},
      ccDay:{title:'Card Due Day',fields:[{path:'config.ccDay',label:'Day of month (1–31)',type:'number'}]},
      treats:{title:'Guilt-Free Treats',fields:[{path:'config.treatsClaimed',label:'Treats used so far (1 earned per level-up)',type:'number'}]},
    };
    function openModal(key){
      const spec=EDITS[key]; if(!spec) return;
      modalSpec=spec;
      const ov=document.createElement('div'); ov.className='overlay'; ov.id='dashModal';
      ov.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-label="${spec.title}">
        <header>Amendment — ${spec.title}</header>
        <div class="body">
          ${spec.fields.map((f,i)=>`<label for="mf${i}">${f.label}</label>
            <input id="mf${i}" type="${f.type}" value="${getPath(Dash.state,f.path)??''}" ${f.type==='number'?'inputmode="decimal"':''}>`).join('')}
          <div class="mBtns"><button class="cancel" data-mclose>Cancel</button><button class="save" data-msave>Stamp It</button></div>
        </div></div>`;
      ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(); });
      ov.querySelector('[data-mclose]').onclick=closeModal;
      ov.querySelector('[data-msave]').onclick=saveModal;
      document.body.appendChild(ov);
      const first=ov.querySelector('input'); if(first) first.focus();
    }
    function closeModal(){ const m=document.getElementById('dashModal'); if(m) m.remove(); modalSpec=null; }
    function saveModal(){
      if(!modalSpec) return;
      modalSpec.fields.forEach((f,i)=>{
        const el=document.getElementById('mf'+i); if(!el) return;
        let v=el.value;
        v = f.type==='number' ? (parseFloat(String(v).replace(/[^0-9.\-]/g,''))||0) : String(v).trim();
        Dash.set(f.path,v);
      });
      closeModal();
    }
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

    function celebrate(streak){
      const toast=document.createElement('div'); toast.className='toast'; toast.setAttribute('role','status');
      toast.textContent=`Day locked — streak ${streak}! 🔥`;
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(), 3200);
      if(REDUCED){
        const lc=document.createElement('div'); lc.className='lockCard';
        lc.innerHTML=`<div class="inner">✦ DAY LOCKED ✦<br>STREAK ${pad(streak,3)}</div>`;
        document.body.appendChild(lc); setTimeout(()=>lc.remove(), 3200);
        return;
      }
      const box=document.createElement('div'); box.className='burstBox';
      const cols=['#C8271C','#1F7A4D','#C9A227','#14213D'];
      for(let i=0;i<20;i++){
        const leaf=i%3===0;
        const el=document.createElement('span');
        el.className=leaf?'pc':'pcSq';
        if(leaf) el.textContent='🍁'; else el.style.background=cols[i%cols.length];
        const ang=Math.PI*2*i/20 + Math.random()*.4, dist=90+Math.random()*90;
        el.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');
        el.style.setProperty('--dy',(Math.sin(ang)*dist*0.8+40).toFixed(0)+'px');
        el.style.setProperty('--rot',(Math.random()*300-150).toFixed(0)+'deg');
        box.appendChild(el);
      }
      document.body.appendChild(box); setTimeout(()=>box.remove(), 1500);
    }

    function deny(){
      const toast=document.createElement('div'); toast.className='toast'; toast.setAttribute('role','status');
      toast.style.background='var(--maple)'; toast.style.borderColor='#7A1410';
      toast.textContent='Entry DENIED — streak broken. 💔';
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(), 3200);
      const lc=document.createElement('div'); lc.className='lockCard';
      lc.innerHTML=`<div class="inner">✗ ENTRY REFUSED ✗<br>CLEAN PAGE TOMORROW</div>`;
      document.body.appendChild(lc); setTimeout(()=>lc.remove(), 2200);
    }

    function draw(s){
      const root=document.getElementById('appRoot');
      const d=(s.days&&s.days[Dash.today])||{};
      const CORE7=['smokefree','gym','language','cooked','sleep'];
      const doneCount=CORE7.filter(k=>d[k]===true).length;
      const busted=CORE7.some(k=>d[k]==='fail');

      root.innerHTML =
        (tab==='today'?todayHTML(s,d)
        :tab==='pr'?prHTML(s)
        :tab==='money'?moneyHTML(s)
        :tab==='history'?historyHTML(s)
        :healthHTML()) + navHTML();

      root.querySelectorAll('[data-toggle]').forEach(el=>{
        const fire=()=>{
          const path=el.dataset.toggle;
          const cur=getPath(Dash.state,path);
          const next = path.startsWith('days.')
            ? (cur===true ? 'fail' : cur==='fail' ? false : true)
            : !cur;
          Dash.set(path,next);
        };
        el.addEventListener('click',fire);
        el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fire(); } });
      });
      root.querySelectorAll('[data-time]').forEach(inp=>{
        inp.addEventListener('click',e=>e.stopPropagation());
        inp.addEventListener('keydown',e=>e.stopPropagation());
        inp.addEventListener('change',()=>Dash.set(inp.dataset.time, inp.value));
      });
      root.querySelectorAll('[data-edit]').forEach(el=>{
        el.addEventListener('click',()=>{
          if(el.dataset.edit==='actionsCount'){
            const card=document.getElementById('actionCard');
            if(card){ window.scrollTo({top:card.offsetTop-70, behavior:REDUCED?'auto':'smooth'});
              card.style.outline='3px solid var(--foil)'; setTimeout(()=>card.style.outline='',1200); }
            return;
          }
          openModal(el.dataset.edit);
        });
      });
      root.querySelectorAll('[data-fine]').forEach(el=>{
        const fire=()=>{
          const cur=(getPath(Dash.state,`days.${Dash.today}.fines`)||[]).slice();
          cur.push(el.dataset.fine);
          Dash.set(`days.${Dash.today}.fines`,cur);
        };
        el.addEventListener('click',fire);
        el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fire(); } });
      });
      const undoBtn=root.querySelector('[data-fineundo]');
      if(undoBtn) undoBtn.addEventListener('click',e=>{
        e.stopPropagation();
        const cur=(getPath(Dash.state,`days.${Dash.today}.fines`)||[]).slice();
        cur.pop();
        Dash.set(`days.${Dash.today}.fines`,cur);
      });
      root.querySelectorAll('[data-hday]').forEach(el=>{
        el.addEventListener('click',()=>openDayModal(el.dataset.hday));
      });
      root.querySelectorAll('[data-tab]').forEach(el=>{
        el.addEventListener('click',()=>{ tab=el.dataset.tab; draw(Dash.state); window.scrollTo({top:0}); });
      });

      const allCore=doneCount===CORE7.length;
      if(prevCore===false && allCore) celebrate(s.streak);
      prevCore=allCore;
      if(prevBusted===false && busted) deny();
      prevBusted=busted;
    }

    Dash.render(draw);
  })();
}
</script>
</body>
</html>
