name: Notifications

# Every scheduled run calls notify.mjs --mode=auto: the script reads the
# Toronto wall clock + Firestore notifyLog and decides what (if anything) is
# due — morning brief, a tap-window nudge, or the 9 PM anchor reminder.
# Cron entries come in DST pairs, off the top of the hour, scheduled BEFORE
# the target window because GitHub cron lands 0-90+ minutes late.
on:
  schedule:
    - cron: '45 10 * * *'  # brief, EDT (lands ~7-8 AM Toronto)
    - cron: '45 11 * * *'  # brief, EST
    - cron: '15 16 * * *'  # midday nudge, EDT (lands ~12:15-1:45 PM)
    - cron: '15 17 * * *'  # midday nudge, EST
    - cron: '45 20 * * *'  # afternoon nudge, EDT (lands ~4:45-6:15 PM)
    - cron: '45 21 * * *'  # afternoon nudge, EST
    - cron: '15 0 * * *'   # evening nudge, EDT (lands ~8:15-9:45 PM)
    - cron: '15 1 * * *'   # evening nudge, EST
    - cron: '45 0 * * *'   # anchor reminder, EDT (lands ~9-10:15 PM)
    - cron: '45 1 * * *'   # anchor reminder, EST
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which notification to send'
        type: choice
        options: [auto, brief, streak]
        default: auto
      force:
        description: 'Ignore the time guard (brief/streak only)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install sender deps
        run: npm install --no-audit --no-fund
        working-directory: scripts
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "flags=${{ inputs.force && '--force' || '' }}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled runs always use auto — the script decides what's due.
            echo "mode=auto" >> "$GITHUB_OUTPUT"
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - name: Send notification
        run: node scripts/notify.mjs --mode=${{ steps.mode.outputs.mode }} ${{ steps.mode.outputs.flags }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
