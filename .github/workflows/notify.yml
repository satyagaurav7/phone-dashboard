name: Notifications

# Two cron entries per notification because GitHub cron is UTC and has no DST
# awareness. Scheduled at :45 before the target hour and OFF the top of the
# hour because GitHub cron runs 1-3 hours late at busy times — notify.mjs
# accepts a send window (brief 7-9 AM, streak 9 PM-midnight Toronto) and a
# Firestore notifyLog dedupe stops the pair from double-sending.
on:
  schedule:
    - cron: '45 10 * * *'  # brief, EDT (nominal 6:45 AM; real start lands 7-8 AM)
    - cron: '45 11 * * *'  # brief, EST
    - cron: '45 0 * * *'   # streak saver, EDT (nominal 8:45 PM)
    - cron: '45 1 * * *'   # streak saver, EST
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which notification to send'
        type: choice
        options: [brief, streak]
        default: brief
      force:
        description: 'Ignore the local-hour guard (send right now)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install sender deps
        run: npm install --no-audit --no-fund
        working-directory: scripts
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "flags=${{ inputs.force && '--force' || '' }}" >> "$GITHUB_OUTPUT"
          else
            H=$(date -u +%H | sed 's/^0//')
            # Brief crons fire 10:45/11:45 UTC and can run hours late; anything
            # in the 10-15 UTC range is a brief attempt, the rest are streak.
            if [ "$H" -ge 10 ] && [ "$H" -le 15 ]; then MODE=brief; else MODE=streak; fi
            echo "mode=$MODE" >> "$GITHUB_OUTPUT"
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - name: Send notification
        run: node scripts/notify.mjs --mode=${{ steps.mode.outputs.mode }} ${{ steps.mode.outputs.flags }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
